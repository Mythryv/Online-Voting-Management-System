<!DOCTYPE html>
<html>
<head>
    <title>Online Voting System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Online Voting System</h1>

    <div class="container">

        <div class="candidate">
            <h3>Candidate A</h3>
            <p>Votes: <span id="A">0</span></p>
            <button onclick="vote('A')">Vote</button>
        </div>

        <div class="candidate">
            <h3>Candidate B</h3>
            <p>Votes: <span id="B">0</span></p>
            <button onclick="vote('B')">Vote</button>
        </div>

        <div class="candidate">
            <h3>Candidate C</h3>
            <p>Votes: <span id="C">0</span></p>
            <button onclick="vote('C')">Vote</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
